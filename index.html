<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jehova es mi Pastor - POS | Gestión Premium de Autolavados</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            deep: '#020617',
                            surface: '#0f172a',
                            yellow: '#fbbf24',
                            emerald: '#10b981',
                            border: 'rgba(255,255,255,0.08)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }

        /* Interactive Geometric Background */
        .grid-pattern {
            position: absolute;
            inset: -20%;
            width: 140%;
            height: 140%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(rgba(251, 191, 36, 0.08) 2px, transparent 2px),
                linear-gradient(90deg, rgba(251, 191, 36, 0.08) 2px, transparent 2px);
            background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
            background-position: center auto;
            z-index: 0;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
        }

        .cursor-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.35) 0%, rgba(59, 130, 246, 0.20) 40%, transparent 60%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            border-color: rgba(251, 191, 36, 0.2);
            transform: translateY(-8px) scale(1.01);
            background: rgba(30, 41, 59, 0.4);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #fcd34d 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.1));
        }

        .btn-primary {
            position: relative;
            background: #fbbf24;
            color: #020617;
            border: 1px solid #fbbf24;
            overflow: hidden;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: -1;
            border-radius: inherit;
        }

        .btn-primary:hover {
            color: #fbbf24;
            box-shadow: 0 20px 40px -10px rgba(251, 191, 36, 0.3);
            transform: scale(1.02);
            border-color: rgba(251, 191, 36, 0.5);
        }

        .btn-primary:hover::before {
            transform: translateY(0);
        }

        /* Navbar Specific Animations */
        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 100px;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-link:hover {
            background: rgba(251, 191, 36, 0.05);
            border-color: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .nav-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            overflow: hidden;
            border-radius: 100px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .nav-btn .btn-icon {
            width: 0;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .nav-btn:hover {
            background: white !important;
            color: #0f172a !important;
            gap: 12px;
            padding-left: 20px;
            padding-right: 28px;
        }

        .nav-btn:hover .btn-icon {
            width: 24px;
            opacity: 1;
            transform: translateX(0);
        }

        .reveal { opacity: 0; transform: translateY(40px); }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => (
            <span className={`material-symbols-outlined ${className}`}>{name}</span>
        );

        const Nav = () => (
            <header className="fixed top-0 w-full z-[100] bg-[#020617]/70 backdrop-blur-2xl border-b border-white/5 py-4 px-6 md:px-8">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                    
                    {/* 1. Brand Logo (Left) */}
                    <div className="w-1/3 flex justify-start">
                        <div className="flex items-center gap-4 cursor-pointer">
                            <div className="bg-brand-yellow p-2.5 rounded-2xl shadow-2xl shadow-brand-yellow/10">
                                <Icon name="local_car_wash" className="text-brand-deep font-bold" />
                            </div>
                            <div className="hidden lg:flex flex-col">
                                <h1 className="text-lg font-black text-white italic tracking-tighter uppercase leading-none">
                                    Hyper <span className="text-brand-yellow">Bee</span>
                                </h1>
                                <span className="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 mt-1">Wash Control</span>
                            </div>
                        </div>
                    </div>

                    {/* 2. Desktop Menu (Center) */}
                    <nav className="w-1/3 hidden md:flex items-center justify-center gap-1 lg:gap-3">
                        {[
                            { name: 'Módulos', id: 'modulos' },
                            { name: 'Beneficios', id: 'features' },
                            { name: 'Inversión', id: 'precios' }
                        ].map((item) => (
                            <a 
                                key={item.id}
                                href={`#${item.id}`} 
                                onClick={(e) => {
                                    e.preventDefault();
                                    document.getElementById(item.id)?.scrollIntoView({ behavior: 'smooth' });
                                }}
                                className="nav-link px-5 py-2.5 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400"
                            >
                                {item.name}
                            </a>
                        ))}
                    </nav>

                    {/* 3. Action Button (Right) */}
                    <div className="w-1/3 hidden md:flex justify-end">
                        <button className="nav-btn bg-brand-yellow text-brand-deep px-6 lg:px-8 py-2.5 font-black text-[10px] uppercase tracking-[0.2em] shadow-xl shadow-brand-yellow/5 active:scale-95 transition-all">
                            <Icon name="arrow_forward" className="btn-icon text-lg" />
                            <span>Solicitar Demo</span>
                        </button>
                    </div>

                    {/* Mobile Toggle */}
                    <div className="w-1/3 flex justify-end md:hidden">
                        <button className="text-white flex items-center justify-center p-2 rounded-xl bg-white/5 border border-white/10">
                            <Icon name="menu" className="text-2xl" />
                        </button>
                    </div>

                </div>
            </header>
        );

        const Hero = () => {
            const gridRef = useRef(null);
            const glowRef = useRef(null);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const { clientX, clientY } = e;
                    
                    // Parallax shift constraint
                    const xGrid = (clientX / window.innerWidth - 0.5) * -40; 
                    const yGrid = (clientY / window.innerHeight - 0.5) * -40; 
                    
                    gsap.to(gridRef.current, {
                        x: xGrid,
                        y: yGrid,
                        duration: 1.5,
                        ease: "power2.out"
                    });

                    const hero = document.getElementById("hero-section");
                    if(hero) {
                        const rect = hero.getBoundingClientRect();
                        const glowX = clientX - rect.left;
                        const glowY = clientY - rect.top;
                        
                        gsap.to(glowRef.current, {
                            x: glowX,
                            y: glowY,
                            xPercent: -50,
                            yPercent: -50,
                            duration: 0.6,
                            ease: "power2.out"
                        });
                    }
                };

                window.addEventListener('mousemove', handleMouseMove);
                
                if(glowRef.current) {
                    gsap.set(glowRef.current, { x: window.innerWidth / 2, y: window.innerHeight / 2, xPercent: -50, yPercent: -50 });
                }

                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <section id="hero-section" className="pt-48 pb-32 px-6 relative min-h-[90vh] flex items-center justify-center overflow-hidden bg-brand-deep">
                    {/* Interactive Grid & Glow */}
                    <div ref={gridRef} className="grid-pattern"></div>
                    <div ref={glowRef} className="cursor-glow"></div>
                    
                    <div className="max-w-7xl mx-auto text-center relative z-10 flex flex-col items-center">

                        <h1 className="text-5xl md:text-7xl lg:text-[110px] text-white font-black tracking-tighter mb-10 leading-[0.9] reveal uppercase">
                            CONTROL <span className="text-brand-yellow">TOTAL</span> DE TU 
                            AUTOLAVADO.
                        </h1>
                        <p className="max-w-3xl mx-auto text-xl md:text-2xl text-slate-400 font-medium mb-16 reveal leading-relaxed">
                            Optimiza ingresos, gestiona nóminas y monitorea tu negocio en tiempo real con una interfaz diseñada para la velocidad.
                        </p>
                        <div className="flex flex-col md:flex-row justify-center gap-8 reveal">
                            <button className="btn-primary px-14 py-6 rounded-[24px] font-black text-xl uppercase tracking-widest flex items-center justify-center gap-4 group">
                                <span className="z-10 relative">Solicitar Demo</span>
                            </button>
                        </div>
                    </div>
                </section>
            );
        };

        const ModuleCard = ({ icon, title, description, badge, image, onImageClick }) => (
            <div className="glass-card rounded-[2rem] p-4 flex flex-col h-full reveal group overflow-hidden relative">
                
                {/* Image Placeholder / Screenshot Container */}
                <div 
                    className="w-full relative mb-8 rounded-2xl overflow-hidden border border-white/5 bg-[#020617] group-hover:border-brand-yellow/30 transition-all duration-700 cursor-zoom-in"
                    onClick={() => onImageClick && onImageClick(image)}
                >
                    <img 
                        src={image} 
                        alt={title} 
                        className="w-full h-auto object-cover opacity-80 group-hover:scale-[1.02] group-hover:opacity-100 transition-all duration-700"
                        onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                    />
                    
                    {/* Hover Overlay: Clic para ver */}
                    <div className="absolute inset-0 bg-brand-deep/50 backdrop-blur-[2px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 pointer-events-none">
                        <div className="bg-brand-yellow text-brand-deep px-6 py-3 rounded-full font-black uppercase text-[10px] tracking-widest flex items-center gap-2 transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 shadow-xl shadow-brand-yellow/20">
                            <Icon name="zoom_in" className="text-xl" /> Dar clic para ver detalles
                        </div>
                    </div>
                    {/* Fallback if image path is broken */}
                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-700 hidden">
                        <Icon name="image_not_supported" className="text-4xl mb-2 opacity-50" />
                        <span className="text-[10px] uppercase tracking-widest font-bold">Screenshot Missing</span>
                    </div>
                    {/* Dark gradient overlay for smooth integration */}
                    <div className="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent group-hover:opacity-40 transition-all duration-700 pointer-events-none"></div>
                </div>

                <div className="px-6 pb-8 flex-1 flex flex-col">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-xl bg-brand-yellow/10 flex items-center justify-center border border-brand-yellow/20 group-hover:bg-brand-yellow group-hover:text-brand-deep transition-colors duration-500">
                                <Icon name={icon} className="text-brand-yellow text-2xl group-hover:text-brand-deep transition-colors" />
                            </div>
                            <h3 className="text-2xl md:text-3xl font-black text-white tracking-tighter">{title}</h3>
                        </div>
                    </div>
                    <p className="text-slate-400 leading-relaxed font-light text-base md:text-lg">{description}</p>
                </div>
            </div>
        );

        const PriceCard = ({ title, price, subtitle, features, primary = false }) => (
            <div className={`h-full relative p-10 md:p-12 rounded-[2rem] flex flex-col group overflow-hidden ${primary ? 'bg-[#050b14] border border-brand-yellow/20 shadow-[0_30px_60px_-15px_rgba(251,191,36,0.1)] z-10' : 'bg-transparent border border-white/5 hover:bg-white/[0.02]'} reveal transition-all duration-700`}>
                
                {/* Ambience Soft Glows */}
                {primary && (
                    <>
                        <div className="absolute top-0 right-0 -mr-20 -mt-20 w-72 h-72 bg-brand-yellow/10 rounded-full blur-[80px] pointer-events-none transition-all duration-700 group-hover:bg-brand-yellow/20" />
                        <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 bg-blue-500/10 rounded-full blur-[80px] pointer-events-none" />
                    </>
                )}
                
                {/* Badge Alignment / Spacer */}
                <div className={`mb-8 ${primary ? '' : 'opacity-0 select-none pointer-events-none'}`}>
                    <span className="inline-flex py-1.5 px-3 rounded-full bg-brand-yellow/[0.05] border border-brand-yellow/20 text-[9px] font-black uppercase tracking-[0.3em] text-brand-yellow">
                        {primary ? 'Acceso Total' : 'Placeholder'}
                    </span>
                </div>
                
                <h4 className={`text-[10px] font-bold uppercase tracking-[0.4em] mb-4 ${primary ? 'text-white' : 'text-slate-500'}`}>{title}</h4>
                <div className="flex items-baseline gap-2 mb-2">
                    <span className={`text-6xl md:text-8xl font-black tracking-tighter ${primary ? 'text-transparent bg-clip-text bg-gradient-to-r from-brand-yellow to-yellow-100' : 'text-white'}`}>{price}</span>
                    <span className={`text-sm font-bold uppercase tracking-[0.2em] ${primary ? 'text-brand-yellow/60' : 'text-slate-600'}`}>USD</span>
                </div>
                <p className={`font-medium text-sm mb-12 ${primary ? 'text-slate-400' : 'text-slate-500'}`}>{subtitle}</p>
                
                <div className="w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent mb-12"></div>

                <ul className="space-y-6 mb-14 flex-1">
                    {features.map((f, i) => (
                        <li key={i} className="flex items-start gap-4">
                            <Icon name="check" className={`text-xl mt-0 shadow-sm ${primary ? "text-brand-yellow drop-shadow-[0_0_8px_rgba(251,191,36,0.3)]" : "text-white/20"}`} /> 
                            <span className={`text-sm md:text-[15px] leading-relaxed font-light ${primary ? 'text-slate-300' : 'text-slate-400'}`}>{f}</span>
                        </li>
                    ))}
                </ul>
                
                <button className={`w-full py-5 rounded-2xl font-black text-xs uppercase tracking-[0.25em] transition-all duration-500 bg-transparent border relative overflow-hidden group/btn ${primary ? 'border-brand-yellow/50 text-brand-yellow hover:border-brand-yellow hover:bg-brand-yellow hover:text-brand-deep hover:shadow-[0_0_30px_rgba(251,191,36,0.3)]' : 'border-white/10 text-white hover:bg-white hover:text-black'}`}>
                    <span className="relative z-10">{primary ? 'Comenzar Ahora' : 'Añadir al plan'}</span>
                </button>
            </div>
        );

        function App() {
            const [lightboxImg, setLightboxImg] = useState(null);

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.to(".reveal", {
                    opacity: 1,
                    y: 0,
                    duration: 1,
                    stagger: 0.1,
                    ease: "power3.out",
                    scrollTrigger: {
                        trigger: ".reveal",
                        start: "top 85%",
                    }
                });
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {/* LIGHTBOX POPUP */}
                    {lightboxImg && (
                        <div 
                            className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md transition-all"
                            onClick={() => setLightboxImg(null)}
                        >
                            {/* Premium External Close Button */}
                            <button 
                                className="absolute top-6 right-6 md:top-10 md:right-10 flex items-center gap-2 text-slate-400 hover:text-brand-yellow transition-colors group z-[210] uppercase tracking-[0.2em] font-black text-[10px]"
                                onClick={() => setLightboxImg(null)}
                            >
                                Cerrar <Icon name="close" className="text-3xl group-hover:rotate-90 transition-transform duration-500" />
                            </button>

                            <div 
                                className="relative max-w-7xl w-full max-h-[95vh] rounded-[2rem] overflow-hidden shadow-[0_0_150px_rgba(0,0,0,0.5)] flex items-center justify-center pointer-events-none"
                                style={{ animation: 'scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards' }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <img src={lightboxImg} className="w-auto h-auto max-w-full max-h-[95vh] object-contain rounded-[2rem] pointer-events-auto" />
                            </div>
                        </div>
                    )}

                    <Nav />

                    {/* HERO */}
                    <Hero />

                    {/* MÓDULOS DEL SISTEMA */}
                    <section id="modulos" className="py-32 px-6 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-20 text-center">
                                <span className="text-brand-yellow font-black uppercase tracking-[0.4em] text-[10px]">Experiencia de Usuario</span>
                                <h2 className="text-4xl md:text-6xl font-black text-white mt-4 mb-6">MODULOS INTELIGENTES</h2>
                                <p className="text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed">
                                    Diseñado específicamente para el flujo de trabajo de un autolavado moderno.
                                </p>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <ModuleCard 
                                    icon="dashboard" 
                                    title="Panel Inteligente" 
                                    description="Visualización de ingresos diarios, flujo de vehículos y ticket promedio en tiempo real."
                                    image="./images/panel de control.jpeg"
                                    onImageClick={setLightboxImg}
                                />
                                <ModuleCard 
                                    icon="payments" 
                                    title="Gestión de Nómina" 
                                    description="Cálculo automático por ticket, comisión, diario o semanal. Gestión de propinas y descuentos."
                                    image="./images/nomina.jpeg"
                                    onImageClick={setLightboxImg}
                                />
                                <ModuleCard 
                                    icon="account_balance_wallet" 
                                    title="Cierre de Caja" 
                                    description="Comparativa de efectivo real vs. sistema para evitar faltantes. Cierre blindado e instantáneo."
                                    image="./images/cierre de caja.jpeg"
                                    onImageClick={setLightboxImg}
                                />
                                <ModuleCard 
                                    icon="settings_bluetooth" 
                                    title="Configuración Avanzada" 
                                    description="Conexión de impresoras Bluetooth (58mm/80mm) y catálogo de servicios personalizado por tipo de vehículo (Sedán, SUV, Moto)."
                                    image="./images/configuracion.jpeg"
                                    onImageClick={setLightboxImg}
                                />
                            </div>
                        </div>
                    </section>

                    {/* FEATURES SECTION (Radical Efficiency) */}
                    <section id="features" className="py-32 bg-[#020617] relative border-y border-white/5">
                        {/* subtle grid background */}
                        <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:60px_60px] [mask-image:radial-gradient(ellipse_60%_60%_at_50%_50%,#000_10%,transparent_100%)] pointer-events-none"></div>
                        
                        <div className="max-w-[1400px] mx-auto px-6 relative z-10">
                            <div className="text-center mb-20 reveal">
                                <h2 className="text-4xl md:text-6xl font-black text-white mb-6 leading-[1.1] tracking-tighter uppercase">
                                    Eficiencia radical <br/> en cada <span className="font-black text-brand-yellow px-2  titlecase">DETALLE.</span>
                                </h2>
                                <p className="text-slate-400 max-w-2xl mx-auto text-lg md:text-xl leading-relaxed font-light">
                                    Elimina cuellos de botella y maximiza la rentabilidad de cada turno con herramientas diseñadas para la velocidad.
                                </p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    {icon: 'timer', title: 'Registro en 10 segundos', desc: "Registra un 'Nuevo Ticket' en menos de 10 segundos. No hagas esperar a tus clientes."},
                                    {icon: 'security', title: 'Caja Blindada', desc: "Deja de perder dinero por mala administración. Con nuestro cierre de caja, cada centavo está contabilizado."},
